[build]
  publish = "."

# Force www to non-www
[[redirects]]
  from = "https://www.mgscommunications.com/*"
  to = "https://mgscommunications.com/:splat"
  status = 301
  force = true

# Security & performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "frame-ancestors 'none'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# CSS and JS must always revalidate so code updates propagate on refresh
# (filenames aren't versioned/hashed, so we can't use `immutable` safely)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images + favicons stay aggressively cached — they rarely change and
# when they do we typically rename the file (kenwood-nx1300-v2.jpg, etc.)
[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages should revalidate
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Payment page — allow NMI Collect.js scripts, iframes, and connections
[[headers]]
  for = "/pay/*"
  [headers.values]
    Content-Security-Policy = "script-src 'self' 'unsafe-inline' https://secure.nmi.com https://fonts.googleapis.com; frame-src https://secure.nmi.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://secure.nmi.com; connect-src 'self' https://secure.nmi.com; frame-ancestors 'none'"

# Netlify Functions directory
[functions]
  directory = "netlify/functions"

# Netlify Forms settings
[build.processing]
  skip_processing = false
